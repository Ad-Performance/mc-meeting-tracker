<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meeting Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f4f0;
  --surface: #ffffff;
  --border: #e2e0d8;
  --border2: #d0cdc2;
  --text: #1a1916;
  --text2: #6b6860;
  --text3: #a8a59e;
  --accent: #1a6b3c;
  --accent-bg: #edf7f1;
  --accent3: #1a4a8a;
  --accent3-bg: #edf2fb;
  --red: #c0392b;
  --red-bg: #fdf0ef;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Sarabun', sans-serif; font-size: 15px; min-height: 100vh; }

/* TOP BAR */
.topbar { background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; height: 52px; gap: 12px; position: sticky; top: 0; z-index: 50; }
.brand { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 500; color: var(--accent); letter-spacing: .06em; white-space: nowrap; }
.tab-row { display: flex; gap: 2px; flex: 1; }
.tab { padding: 6px 14px; border: none; background: none; font-family: 'Sarabun', sans-serif; font-size: 13px; font-weight: 500; color: var(--text2); border-radius: 6px; cursor: pointer; transition: .15s; }
.tab:hover { background: var(--bg); color: var(--text); }
.tab.on { background: var(--accent-bg); color: var(--accent); }
.topbar-actions { display: flex; gap: 8px; margin-left: auto; }
.btn { padding: 6px 14px; border-radius: 7px; border: 1px solid var(--border2); background: var(--surface); color: var(--text); font-family: 'Sarabun', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: .15s; white-space: nowrap; }
.btn:hover { background: var(--bg); }
.btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn.primary:hover { filter: brightness(1.1); }
.btn.sm { padding: 4px 10px; font-size: 12px; }
.btn.ghost { border-color: transparent; background: none; color: var(--text2); }
.btn.ghost:hover { background: var(--bg); color: var(--text); }
.btn.danger { color: var(--red); border-color: transparent; background: none; }
.btn.danger:hover { background: var(--red-bg); }

/* LAYOUT */
.layout { display: flex; height: calc(100vh - 52px); }
.sidebar { width: 240px; min-width: 240px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; }
.sidebar-hd { padding: 14px 16px 8px; font-size: 10px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--text3); }
.sitem { padding: 9px 16px; cursor: pointer; border-left: 3px solid transparent; transition: .12s; }
.sitem:hover { background: var(--bg); }
.sitem.on { background: var(--accent-bg); border-left-color: var(--accent); }
.sitem-date { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--accent); font-weight: 500; }
.sitem-title { font-size: 13px; font-weight: 500; color: var(--text); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sitem-sub { font-size: 11px; color: var(--text3); margin-top: 1px; }
.main { flex: 1; overflow-y: auto; }

/* MEETING PAD */
.pad { max-width: 780px; margin: 0 auto; padding: 28px 28px 60px; }
.pad-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 24px; gap: 16px; }
.pad-title-wrap { flex: 1; }
.pad-date { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text3); margin-bottom: 4px; }
.pad-title { font-size: 22px; font-weight: 700; color: var(--text); border: none; background: none; width: 100%; font-family: 'Sarabun', sans-serif; outline: none; padding: 0; }
.pad-title::placeholder { color: var(--text3); }
.section { margin-bottom: 28px; }
.sec-label { font-size: 10px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: var(--text3); display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.sec-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* Attendees */
.att-chips { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; margin-bottom: 6px; }
.chip-add { display: inline-flex; align-items: center; padding: 4px 12px; border-radius: 20px; border: 1px dashed var(--border2); background: none; color: var(--accent); font-family: 'Sarabun',sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: .12s; }
.chip-add:hover { background: var(--accent-bg); border-style: solid; }
.att-dd-wrap { background: var(--surface); border: 1px solid var(--border2); border-radius: 10px; box-shadow: 0 4px 16px rgba(0,0,0,.1); overflow: hidden; margin-top: 4px; }
.att-dd-top { border-bottom: 1px solid var(--border); }
.att-search { width: 100%; border: none; border-bottom: 1px solid var(--border); padding: 10px 14px; font-family: 'Sarabun',sans-serif; font-size: 13px; color: var(--text); outline: none; background: var(--bg); }
.att-dd-actions { display: flex; gap: 6px; padding: 8px 12px; background: var(--bg); }
.att-options { max-height: 240px; overflow-y: auto; }
.att-check { cursor: pointer; user-select: none; }
.att-check:hover { background: var(--accent-bg); }
.att-check.checked-row { background: var(--accent-bg); }
.att-cb { accent-color: var(--accent); width: 16px; height: 16px; flex-shrink: 0; cursor: pointer; }
/* Attendees original (keep for fallback) */
.att-wrap { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; padding: 8px 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; min-height: 42px; cursor: text; }
.att-wrap:focus-within { border-color: var(--accent); }
.chip { display: inline-flex; align-items: center; gap: 5px; background: var(--accent-bg); border: 1px solid #c5e3d0; border-radius: 20px; padding: 3px 10px; font-size: 13px; color: var(--accent); font-weight: 500; }
.chip .x { cursor: pointer; color: var(--text3); font-size: 15px; line-height: 1; margin-left: 2px; }
.chip .x:hover { color: var(--red); }
.quick-input { border: none; background: none; outline: none; font-family: 'Sarabun', sans-serif; font-size: 14px; color: var(--text); min-width: 120px; padding: 2px 0; }
.quick-input::placeholder { color: var(--text3); }

/* Topics */
.topic-item { display: flex; gap: 10px; align-items: flex-start; padding: 8px 0; border-bottom: 1px solid var(--border); }
.topic-item:last-child { border-bottom: none; }
.topic-num { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text3); min-width: 20px; padding-top: 3px; }
.topic-text { flex: 1; border: none; background: none; outline: none; font-family: 'Sarabun', sans-serif; font-size: 14px; color: var(--text); resize: none; min-height: 24px; line-height: 1.5; padding: 0; }
.topic-text::placeholder { color: var(--text3); }
.add-row { display: flex; align-items: center; gap: 8px; padding: 8px 0; color: var(--text3); cursor: pointer; font-size: 13px; transition: .12s; border-top: 1px dashed var(--border); }
.add-row:hover { color: var(--accent); }

/* Tasks */
.task-item { display: flex; gap: 10px; align-items: flex-start; padding: 10px 12px; margin-bottom: 6px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; transition: .12s; }
.task-item:hover { border-color: var(--border2); }
.task-left { flex: 1; }
.task-title-input { border: none; background: none; outline: none; font-family: 'Sarabun', sans-serif; font-size: 14px; font-weight: 500; color: var(--text); width: 100%; padding: 0; }
.task-title-input::placeholder { color: var(--text3); font-weight: 400; }
.task-meta { display: flex; gap: 8px; align-items: center; margin-top: 6px; flex-wrap: wrap; }
.meta-input { border: none; border-bottom: 1px solid var(--border); background: none; outline: none; font-family: 'Sarabun', sans-serif; font-size: 12px; color: var(--text2); padding: 2px 4px; }
.meta-input::placeholder { color: var(--text3); }
.status-sel { font-family: 'Sarabun', sans-serif; font-size: 12px; border: 1px solid var(--border); border-radius: 4px; padding: 2px 6px; background: var(--bg); color: var(--text2); cursor: pointer; outline: none; }
.case-link { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--accent3); cursor: pointer; padding: 2px 6px; background: var(--accent3-bg); border-radius: 4px; }
.badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; white-space: nowrap; }
.b-open { background: #fff8e6; color: #b07d00; border: 1px solid #f0d080; }
.b-in_progress { background: var(--accent3-bg); color: var(--accent3); border: 1px solid #b0c8f0; }
.b-closed { background: var(--bg); color: var(--text3); border: 1px solid var(--border); }

/* CASES VIEW */
.cases-wrap { max-width: 860px; margin: 0 auto; padding: 28px 28px 60px; }
.cases-top { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
.cases-top h2 { font-size: 18px; font-weight: 700; flex: 1; }
.stats { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
.stat { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 18px; flex: 1; min-width: 110px; }
.stat-l { font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--text3); margin-bottom: 4px; }
.stat-v { font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 700; }
.v-open { color: #b07d00; } .v-prog { color: var(--accent3); } .v-closed { color: var(--accent); } .v-day { color: var(--red); }
.filter-row { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.fchip { padding: 5px 13px; border-radius: 20px; border: 1px solid var(--border); background: none; font-family: 'Sarabun', sans-serif; font-size: 12px; font-weight: 500; color: var(--text2); cursor: pointer; transition: .12s; }
.fchip.f-all.on { background: var(--bg); color: var(--text); border-color: var(--border2); }
.fchip.f-open.on { background: #fff8e6; color: #b07d00; border-color: #f0d080; }
.fchip.f-in_progress.on { background: var(--accent3-bg); color: var(--accent3); border-color: #b0c8f0; }
.fchip.f-closed.on { background: var(--bg); color: var(--text2); border-color: var(--border2); }
.srch { flex: 1; min-width: 160px; background: var(--surface); border: 1px solid var(--border); border-radius: 7px; padding: 6px 12px; font-family: 'Sarabun', sans-serif; font-size: 13px; color: var(--text); outline: none; }
.srch:focus { border-color: var(--accent); }
.case-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 10px; overflow: hidden; transition: border-color .15s; }
.case-card:hover { border-color: var(--border2); }
.case-hd { display: flex; align-items: center; gap: 12px; padding: 13px 16px; cursor: pointer; user-select: none; }
.case-id-badge { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text3); min-width: 44px; }
.case-ttl { flex: 1; font-weight: 600; font-size: 14px; }
.case-ttl-input { flex: 1; font-weight: 600; font-size: 14px; border: none; background: none; outline: none; font-family: 'Sarabun',sans-serif; color: var(--text); padding: 0; min-width: 120px; }
.case-ttl-input:focus { border-bottom: 1px solid var(--accent); }
.owner-sel { font-family: 'Sarabun',sans-serif; font-size: 12px; border: 1px solid var(--border); border-radius: 4px; padding: 2px 6px; background: var(--bg); color: var(--text2); cursor: pointer; outline: none; max-width: 130px; }
.case-meta2 { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.lead-badge { font-family: 'JetBrains Mono', monospace; font-size: 11px; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 2px 7px; color: var(--text2); }
.chev { color: var(--text3); font-size: 11px; transition: transform .2s; }
.chev.open { transform: rotate(90deg); }
.tl { padding: 0 16px 14px; }
.tl-sep { height: 1px; background: var(--border); margin-bottom: 12px; }
.tl-item { display: flex; gap: 12px; padding: 6px 0; position: relative; }
.tl-item::before { content: ''; position: absolute; left: 9px; top: 26px; bottom: -6px; width: 1px; background: var(--border); }
.tl-item:last-child::before { display: none; }
.tl-dot { width: 20px; height: 20px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 9px; margin-top: 2px; position: relative; z-index: 1; border: 2px solid var(--border); background: var(--bg); }
.d-open { border-color: #f0d080; background: #fff8e6; color: #b07d00; }
.d-update { border-color: #b0c8f0; background: var(--accent3-bg); color: var(--accent3); }
.d-close { border-color: #a0d8b8; background: var(--accent-bg); color: var(--accent); }
.tl-body { flex: 1; }
.tl-actions { display: flex; gap: 2px; align-items: flex-start; opacity: 0; transition: opacity .15s; }
.tl-item:hover .tl-actions { opacity: 1; }
.tl-date { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text3); }
.tl-action { font-size: 13px; color: var(--text); margin-top: 1px; line-height: 1.5; }
.tl-by { font-size: 11px; color: var(--text3); margin-top: 1px; }

/* MODAL */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; width: 100%; max-width: 480px; max-height: 88vh; overflow-y: auto; }
.modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 18px; }
.fg { margin-bottom: 14px; }
.fl { display: block; font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--text2); margin-bottom: 5px; }
.fi, .ft, .fsel { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 7px; padding: 8px 11px; font-family: 'Sarabun', sans-serif; font-size: 13px; color: var(--text); outline: none; transition: border-color .15s; }
.fi:focus, .ft:focus, .fsel:focus { border-color: var(--accent); }
.ft { resize: vertical; min-height: 64px; }
.frow { display: flex; gap: 10px; }
.frow .fg { flex: 1; }
.fa { display: flex; justify-content: flex-end; gap: 8px; margin-top: 18px; }

/* EMPTY */
.empty { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; color: var(--text3); text-align: center; gap: 10px; }
.empty-icon { font-size: 32px; }
.empty h3 { font-size: 15px; color: var(--text2); }

/* TOAST */
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--text); color: #fff; padding: 10px 20px; border-radius: 8px; font-size: 13px; z-index: 999; opacity: 0; transition: opacity .2s; pointer-events: none; white-space: nowrap; }
.toast.show { opacity: 1; }


/* @ MENTION DROPDOWN */
.att-outer { position: relative; }
.att-dropdown { position: absolute; top: 100%; left: 0; right: 0; background: var(--surface); border: 1px solid var(--border2); border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,.1); z-index: 100; max-height: 200px; overflow-y: auto; margin-top: 4px; }
.att-option { padding: 8px 14px; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: .1s; }
.att-option:hover, .att-option.sel { background: var(--accent-bg); }
.att-option-name { font-size: 13px; font-weight: 500; color: var(--text); }
.att-option-email { font-size: 11px; color: var(--text3); }
/* TEAM VIEW */
.team-wrap { max-width: 640px; margin: 0 auto; padding: 28px 28px 60px; }
.team-top { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
.team-top h2 { font-size: 18px; font-weight: 700; flex: 1; }
.member-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; margin-bottom: 8px; display: flex; align-items: center; gap: 14px; }
.member-info { flex: 1; }
.member-name { font-size: 14px; font-weight: 600; color: var(--text); }
.member-email { font-size: 12px; color: var(--text3); margin-top: 2px; }


/* ── RESPONSIVE ── */

/* Tablet: 601–900px */
@media (max-width: 900px) {
  .sidebar { width: 200px; min-width: 200px; }
  .pad { padding: 20px 20px 60px; }
  .cases-wrap, .team-wrap { padding: 20px 20px 60px; }
  .brand { font-size: 11px; }
  .stats { gap: 8px; }
  .stat { padding: 10px 12px; min-width: 90px; }
  .stat-v { font-size: 18px; }
  .case-meta2 { gap: 6px; flex-wrap: wrap; }
}

/* Mobile: ≤600px */
@media (max-width: 600px) {
  /* Topbar: stack brand hidden, tabs scroll, actions shrink */
  .topbar { padding: 0 12px; gap: 8px; height: 48px; }
  .brand { display: none; }
  .tab-row { overflow-x: auto; flex-shrink: 1; gap: 2px; }
  .tab { padding: 5px 10px; font-size: 12px; white-space: nowrap; }
  .topbar-actions { gap: 4px; flex-shrink: 0; }
  .btn.sm { padding: 4px 8px; font-size: 11px; }

  /* Hide sidebar, show bottom nav instead */
  .sidebar { display: none; }
  .layout { height: calc(100vh - 48px - 52px); }
  .main { overflow-y: auto; }

  /* Bottom nav */
  .bottom-nav { display: flex !important; }

  /* Content padding */
  .pad { padding: 14px 14px 80px; }
  .pad-title { font-size: 18px; }
  .cases-wrap, .team-wrap { padding: 14px 14px 80px; }

  /* Stats: 2 per row */
  .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .stat { min-width: unset; }

  /* Case cards: wrap meta */
  .case-hd { flex-wrap: wrap; gap: 8px; padding: 10px 12px; }
  .case-ttl { width: 100%; font-size: 13px; }
  .case-meta2 { width: 100%; gap: 6px; }
  .lead-badge { margin-left: auto; }

  /* Task meta: wrap */
  .task-meta { gap: 6px; }
  .meta-input { font-size: 11px; }

  /* Filter row: scroll */
  .filter-row { flex-wrap: nowrap; overflow-x: auto; padding-bottom: 4px; }
  .fchip { white-space: nowrap; }

  /* Topbar actions: hide text labels on small screens */
  .btn-label { display: none; }

  /* Modal: full width */
  .modal { padding: 18px; border-radius: 12px 12px 0 0; }
  .overlay { align-items: flex-end; padding: 0; }
  .frow { flex-direction: column; gap: 0; }

  /* Member card */
  .member-card { padding: 10px 12px; }
}

/* Bottom nav (mobile only, hidden by default) */
.bottom-nav {
  display: none;
  position: fixed; bottom: 0; left: 0; right: 0;
  height: 52px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  z-index: 50;
  justify-content: space-around;
  align-items: center;
}
.bnav-btn {
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  flex: 1; height: 100%; border: none; background: none;
  font-family: 'Sarabun', sans-serif; font-size: 10px; color: var(--text3);
  cursor: pointer; transition: .15s;
}
.bnav-btn.on { color: var(--accent); }
.bnav-icon { font-size: 18px; line-height: 1; }

</style>
<style id="ro-style">
    .btn.primary, .btn.danger, .btn.ghost,
    .chip-add, .chip .x, .add-row,
    .topbar-actions, .pad-actions,
    .task-title-input, .meta-input, .status-sel, .owner-sel,
    .case-ttl-input, .att-chips button,
    .att-dd-wrap, .topic-text,
    button[onclick*="newMeeting"], button[onclick*="addTask"],
    button[onclick*="addTopic"], button[onclick*="addUpdate"],
    button[onclick*="newCase"], button[onclick*="closeCase"],
    button[onclick*="deleteCase"], button[onclick*="deleteMeeting"],
    button[onclick*="removeTask"], button[onclick*="removeTopic"] {
      display: none !important;
    }
    .case-ttl-input { pointer-events: none; border: none !important; }
    .pad-title { pointer-events: none; }
    .topic-text { pointer-events: none; }
    .task-title-input { pointer-events: none; display: block !important; }
    .topbar { justify-content: flex-start; gap: 12px; }
    .ro-badge {
      display: inline-flex !important;
      align-items: center;
      padding: 4px 12px;
      background: #fff8e6;
      border: 1px solid #f0d080;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      color: #b07d00;
      margin-left: auto;
    }
  </style></head>
<body>

<div class="topbar">
  <div class="brand">◾ MC — Customer Success</div>
  <div class="tab-row">
    <button class="tab on" onclick="setTab('meetings')">📋 Meetings</button>
    <button class="tab" onclick="setTab('cases')">🗂 Cases</button>
    <button class="tab" onclick="setTab('team')">👥 Team</button>

  <div class="topbar-actions">
    <button class="btn sm ghost" onclick="importData()">⬆ Import</button>

    <button class="btn sm ghost" onclick="exportPDF()" style="color:#c0392b;border-color:#e8b4b0">📄 PDF</button>
    <button class="btn primary sm" onclick="newMeeting()">+ New Meeting</button>
  </div>
</div>

<div class="layout">
  <div class="sidebar" id="sidebar"><div class="sidebar-hd">Sessions</div>
    <div class="sitem on" onclick="selectM('c2ybv75')">
      <div class="sitem-date">28 May 2026</div>
      <div class="sitem-title">Wednesday, May 27, 2026</div>
      <div class="sitem-sub">7 people · 4 tasks</div>
    </div></div>
  <div class="main" id="main"><div class="pad">
    <div class="pad-header">

function save() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(S)); } catch(e) {} }
function ensureTeam() { if (!S.team) S.team = []; }

// Utils
const COLORS = ['#1a6b3c','#1a4a8a','#b85c00','#7b2d8b','#0d6e6e','#8b3a3a'];
function nameColor(n) { let h=0; for(let c of (n||'?')) h=(h*31+c.charCodeAt(0))%COLORS.length; return COLORS[h]; }
function initials(n) { return (n||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2); }
function fmtDate(d) { if(!d) return ''; return new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}); }
function today() { return new Date().toISOString().split('T')[0]; }
function genId() { return Math.random().toString(36).slice(2,9); }
function days(a,b) { return Math.max(0,Math.round((new Date(b)-new Date(a))/86400000)); }
function statusLabel(s) { return {open:'Open',in_progress:'In Progress',closed:'Closed'}[s]||s; }
function statusClass(s) { return {open:'b-open',in_progress:'b-in_progress',closed:'b-closed'}[s]||'b-open'; }
function caseNum(id) { const i=S.cases.findIndex(c=>c.id===id); return i>=0?String(i+1).padStart(3,'0'):'???'; }
function toast(msg) { const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),2000); }
function avatar(name,size=22) { return `<div style="width:${size}px;height:${size}px;border-radius:50%;background:${nameColor(name)};display:inline-flex;align-items:center;justify-content:center;font-size:${Math.round(size*.45)}px;font-weight:700;color:#fff;flex-shrink:0">${initials(name)}</div>`; }
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function autoResize(el) { el.style.height='auto'; el.style.height=el.scrollHeight+'px'; }
function closeModal() { document.getElementById('modals').innerHTML=''; }

// Tab
function setTab(tab) {
  activeTab=tab;
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('on',(i===0&&tab==='meetings')||(i===1&&tab==='cases')||(i===2&&tab==='team')));
  document.getElementById('sidebar').style.display=tab==='meetings'?'':'none';
  // update bottom nav
  ['meetings','cases','team'].forEach(t=>{
    const bn=document.getElementById('bn-'+t);
    if(bn) bn.classList.toggle('on', t===tab);
  });
  render();
}

function render() { renderSidebar(); if(activeTab==='meetings') renderMeetingPad(); else if(activeTab==='cases') renderCases(); else renderTeam(); }

// Sidebar

function saveHistory(caseId, idx) {
  const c = S.cases.find(x => x.id === caseId);

  c.history[idx].by = document.getElementById('eh-by').value;
  save(); closeModal(); renderCases(); toast('Updated');
}

function deleteHistory(caseId, idx) {
  const c = S.cases.find(x => x.id === caseId);
  if (c.history.length <= 1) { toast('Cannot delete the only entry'); return; }
  if (!confirm('Delete this entry?')) return;
  c.history.splice(idx, 1);
  save(); renderCases();
}

function toggleCase(id) { const c=S.cases.find(x=>x.id===id); if(c){c._open=!c._open;renderCases();} }

// @ Mention logic
let mentionQuery = '';
let mentionActive = false;

function attKey(e, mid) {
  const input = e.target;
  const val = input.value;

  // Show dropdown when @ typed
  if (e.key === '@') {
    mentionActive = true;
    mentionQuery = '';
    setTimeout(() => showMentionDropdown(mid, input), 10);
    return;
  }

  if (mentionActive) {
    if (e.key === 'Escape') { hideMentionDropdown(); mentionActive = false; return; }
    if (e.key === 'Backspace' && mentionQuery === '') { hideMentionDropdown(); mentionActive = false; return; }
    if (e.key === 'Enter') {
      e.preventDefault();
      const first = document.querySelector('.att-option');
      if (first) first.click();
      return;
    }
    if (e.key.length === 1) {
      mentionQuery += e.key;
      setTimeout(() => showMentionDropdown(mid, input), 10);
    }
    return;
  }

  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault();
    const v = input.value.trim();
    if (!v) return;
    const m = S.meetings.find(x => x.id === mid);
    m.attendees.push(v);
    input.value = '';
    save(); renderMeetingPad();
    setTimeout(() => document.getElementById('att-input')?.focus(), 30);
  }
}

function showMentionDropdown(mid, input) {
  hideMentionDropdown();
  const team = (S.team || []).filter(m =>
    m.name.toLowerCase().includes(mentionQuery.toLowerCase()) ||
    m.email.toLowerCase().includes(mentionQuery.toLowerCase())
  );
  if (!team.length) return;
  const wrap = input.closest('.att-outer') || input.parentElement;
  const dd = document.createElement('div');
  dd.className = 'att-dropdown';
  dd.id = 'att-dd';
  team.forEach(m => {
    const opt = document.createElement('div');
    opt.className = 'att-option';
    opt.innerHTML = `${avatar(m.name, 22)}<div><div class="att-option-name">${esc(m.name)}</div>${m.email ? `<div class="att-option-email">${esc(m.email)}</div>` : ''}</div>`;
    opt.onclick = () => selectMention(mid, m.name, input);
    dd.appendChild(opt);
  });
  wrap.appendChild(dd);
}

function selectMention(mid, name, input) {
  // Remove the @query from input
  input.value = input.value.replace(new RegExp('@' + mentionQuery + '$'), '').trim();
  mentionActive = false; mentionQuery = '';
  hideMentionDropdown();
  const m = S.meetings.find(x => x.id === mid);
  if (!m.attendees.includes(name)) {
    m.attendees.push(name);
    save(); renderMeetingPad();
    setTimeout(() => document.getElementById('att-input')?.focus(), 30);
  } else {
    toast(name + ' already added');
  }
}

function hideMentionDropdown() {
  const dd = document.getElementById('att-dd');
  if (dd) dd.remove();
}



function openAttDropdown(mid) {
  const wrap = document.getElementById('att-dd-wrap-' + mid);
  if (!wrap) return;
  const isOpen = wrap.style.display !== 'none';
  wrap.style.display = isOpen ? 'none' : 'block';
  if (!isOpen) setTimeout(() => document.getElementById('att-search')?.focus(), 30);
  // close when clicking outside
  if (!isOpen) {
    setTimeout(() => {
      document.addEventListener('click', function handler(e) {
        if (!wrap.contains(e.target) && !e.target.classList.contains('chip-add')) {
          wrap.style.display = 'none';
          document.removeEventListener('click', handler);
        }
      });
    }, 100);
  }
}

function closeAttDropdown(mid) {
  const wrap = document.getElementById('att-dd-wrap-' + mid);
  if (wrap) wrap.style.display = 'none';
}

function toggleAtt(mid, name, checked) {
  const m = S.meetings.find(x => x.id === mid);
  if (!m) return;
  if (checked && !m.attendees.includes(name)) {
    m.attendees.push(name);
  } else if (!checked) {
    m.attendees = m.attendees.filter(a => a !== name);
  }
  save();
  // re-render chips only, keep dropdown open
  const chipsEl = document.querySelector('.att-chips');
  if (chipsEl) {
    chipsEl.innerHTML = m.attendees.map((a,i) =>
      `<span class="chip">${avatar(a,18)} ${esc(a)}<span class="x" onclick="removeAtt('${mid}',${i})">×</span></span>`
    ).join('') + `<button class="chip-add" onclick="openAttDropdown('${mid}')">+ Add</button>`;
  }
}

function selectAllAtt(mid) {
  const m = S.meetings.find(x => x.id === mid);
  if (!m) return;
  (S.team||[]).forEach(t => { if (!m.attendees.includes(t.name)) m.attendees.push(t.name); });
  save(); renderMeetingPad(); setTimeout(() => openAttDropdown(mid), 30);
}

function clearAllAtt(mid) {
  const m = S.meetings.find(x => x.id === mid);
  if (!m) return;
  m.attendees = [];
  save(); renderMeetingPad(); setTimeout(() => openAttDropdown(mid), 30);
}

function filterAttOptions(mid, query) {
  const m = S.meetings.find(x => x.id === mid);
  const container = document.getElementById('att-options-' + mid);
  if (!container || !m) return;
  const q = query.toLowerCase();
  const filtered = (S.team||[]).filter(t =>
    t.name.toLowerCase().includes(q) || (t.email||'').toLowerCase().includes(q)
  );
  container.innerHTML = filtered.length
    ? filtered.map(t => `<label class="att-option att-check" onclick="event.stopPropagation()">
        <input type="checkbox" class="att-cb" value="${esc(t.name)}" ${m.attendees.includes(t.name)?'checked':''} onchange="toggleAtt('${mid}','${esc(t.name)}',this.checked)">
        ${avatar(t.name,22)}
        <div><div class="att-option-name">${esc(t.name)}</div>${t.email?`<div class="att-option-email">${esc(t.email)}</div>`:''}</div>
      </label>`).join('')
    : '<div style="padding:12px 14px;color:var(--text3);font-size:13px;">No results</div>';
}

function removeAtt(mid,i){const m=S.meetings.find(x=>x.id===mid);m.attendees.splice(i,1);save();renderMeetingPad();}
function addTopic(mid){const m=S.meetings.find(x=>x.id===mid);m.topics.push({title:''});save();renderMeetingPad();setTimeout(()=>{const ins=document.querySelectorAll('.topic-text');ins[ins.length-1]?.focus();},30);}
function updateTopic(mid,i,key,val){const m=S.meetings.find(x=>x.id===mid);m.topics[i][key]=val;save();}
function removeTopic(mid,i){const m=S.meetings.find(x=>x.id===mid);m.topics.splice(i,1);save();renderMeetingPad();}
function addTask(mid){const m=S.meetings.find(x=>x.id===mid);m.tasks.push({id:genId(),title:'',owner:'',due:'',status:'open',caseId:null});save();renderMeetingPad();setTimeout(()=>{const ins=document.querySelectorAll('.task-title-input');ins[ins.length-1]?.focus();},30);}
function updateTask(mid,tid,key,val){const m=S.meetings.find(x=>x.id===mid);const t=m.tasks.find(x=>x.id===tid);if(t){t[key]=val;save();}}
function removeTask(mid,tid){const m=S.meetings.find(x=>x.id===mid);m.tasks=m.tasks.filter(x=>x.id!==tid);save();renderMeetingPad();}

function linkCase(mid,tid) {
  const cases=S.cases.filter(c=>c.status!=='closed');
  if(!cases.length){toast('No open cases');return;}
  const m=S.meetings.find(x=>x.id===mid); const t=m.tasks.find(x=>x.id===tid);
  document.getElementById('modals').innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal"><h3>Link Task to Case</h3>
      <div class="fg"><label class="fl">Select Case</label>
        <select class="fsel" id="lc-sel"><option value="">None</option>${cases.map(c=>`<option value="${c.id}">#${caseNum(c.id)} ${esc(c.title)}</option>`).join('')}</select>
      </div>
      <div class="fa"><button class="btn ghost" onclick="closeModal()">Cancel</button><button class="btn primary" onclick="saveLinkCase('${mid}','${tid}')">Save</button></div>
    </div></div>`;
  if(t.caseId) document.getElementById('lc-sel').value=t.caseId;
}
function saveLinkCase(mid,tid){const val=document.getElementById('lc-sel').value;updateTask(mid,tid,'caseId',val||null);closeModal();renderMeetingPad();toast('Case linked');}

// Case Actions
function newCase() {
  document.getElementById('modals').innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal"><h3>New Case</h3>
      <div class="fg"><label class="fl">Case Title / Issue</label><input class="fi" id="nc-title" placeholder="Describe the issue..."></div>
      <div class="frow">
        <div class="fg"><label class="fl">Owner</label><select class="fsel" id="nc-owner"><option value="">— Select owner —</option>${(S.team||[]).map(t=>`<option value="${esc(t.name)}">${esc(t.name)}</option>`).join('')}</select></div>
        <div class="fg"><label class="fl">Open Date</label><input class="fi" type="date" id="nc-date" value="${today()}"></div>
      </div>
      <div class="fg"><label class="fl">Description</label><textarea class="ft" id="nc-desc" placeholder="What happened?"></textarea></div>
      <div class="fa"><button class="btn ghost" onclick="closeModal()">Cancel</button><button class="btn primary" onclick="saveNewCase()">Create Case</button></div>
    </div></div>`;
  setTimeout(()=>document.getElementById('nc-title')?.focus(),50);
}
function saveNewCase(){
  const title=document.getElementById('nc-title').value.trim();
  if(!title){toast('Please enter a case title');return;}
  const owner=document.getElementById('nc-owner').value.trim();
  const openDate=document.getElementById('nc-date').value;
  const desc=document.getElementById('nc-desc').value.trim();
  S.cases.push({id:genId(),title,owner,status:'open',openDate,closedDate:null,_open:true,history:[{type:'open',date:openDate,action:desc||'Case opened',by:owner}]});
  save();closeModal();renderCases();toast('Case created');
}

function addUpdate(caseId){
  const c=S.cases.find(x=>x.id===caseId);
  document.getElementById('modals').innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal"><h3>Update: ${esc(c.title)}</h3>
      <div class="frow">
        <div class="fg"><label class="fl">Date</label><input class="fi" type="date" id="up-date" value="${today()}"></div>
        <div class="fg"><label class="fl">By</label><select class="fsel" id="up-by"><option value="">— Select —</option>${(S.team||[]).map(t=>`<option value="${esc(t.name)}" ${t.name===c.owner?'selected':''}>${esc(t.name)}</option>`).join('')}</select></div>
      </div>
      <div class="fg"><label class="fl">Action / Progress</label><textarea class="ft" id="up-action" placeholder="What was done?"></textarea></div>
      <div class="fg"><label class="fl">Update Status</label>
        <select class="fsel" id="up-status">
          ${['open','in_progress','closed'].map(s=>`<option value="${s}" ${c.status===s?'selected':''}>${statusLabel(s)}</option>`).join('')}
        </select>
      </div>
      <div class="fa"><button class="btn ghost" onclick="closeModal()">Cancel</button><button class="btn primary" onclick="saveUpdate('${caseId}')">Save</button></div>
    </div></div>`;
  setTimeout(()=>document.getElementById('up-action')?.focus(),50);
}
function saveUpdate(caseId){
  const action=document.getElementById('up-action').value.trim();
  if(!action){toast('Please describe the action');return;}
  const c=S.cases.find(x=>x.id===caseId);
  const newStatus=document.getElementById('up-status').value;
  const date=document.getElementById('up-date').value;
  c.history.push({type:newStatus==='closed'?'close':'update',date,action,by:document.getElementById('up-by').value.trim()});
  c.status=newStatus; if(newStatus==='closed') c.closedDate=date; c._open=true;
  save();closeModal();renderCases();toast('Updated');
}
function ownerOptions(selected) {
  const opts = (S.team||[]).map(t=>`<option value="${esc(t.name)}" ${t.name===selected?'selected':''}>${esc(t.name)}</option>`).join('');
  return `<option value="">— Owner —</option>${opts}`;
}
function updateCaseField(id, key, val) {
  const c = S.cases.find(x=>x.id===id);
  if (c) { c[key]=val; save(); }
}
function closeCase(id){
  const c=S.cases.find(x=>x.id===id);const d=today();
  c.status='closed';c.closedDate=d;c.history.push({type:'close',date:d,action:'Case closed',by:''});
  c._open=true;save();renderCases();toast('Case closed');
}
function deleteCase(id){if(!confirm('Delete this case?'))return;S.cases=S.cases.filter(x=>x.id!==id);save();renderCases();}

// Export / Import
function exportData(){
  const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`meeting-tracker-${today()}.json`;a.click();toast('Exported!');
}
function exportHTML(){
  const data = JSON.stringify(S, null, 2);
  let snapshot = document.documentElement.outerHTML;

  // Bake in data using marker
  snapshot = snapshot.replace(
    '/*__DATA_MARKER__*/',
    '/*__DATA_MARKER__*/ return ' + data + '; //'
  );

  // Inject read-only mode flag
  snapshot = snapshot.replace(
    'const STORAGE_KEY =',
    'const READ_ONLY = true;\nconst STORAGE_KEY ='
  );

  // Add read-only CSS to hide all edit controls
  const roCSS = `<style id="ro-style">
    .btn.primary, .btn.danger, .btn.ghost,
    .chip-add, .chip .x, .add-row,
    .topbar-actions, .pad-actions,
    .task-title-input, .meta-input, .status-sel, .owner-sel,
    .case-ttl-input, .att-chips button,
    .att-dd-wrap, .topic-text,
    button[onclick*="newMeeting"], button[onclick*="addTask"],
    button[onclick*="addTopic"], button[onclick*="addUpdate"],
    button[onclick*="newCase"], button[onclick*="closeCase"],
    button[onclick*="deleteCase"], button[onclick*="deleteMeeting"],
    button[onclick*="removeTask"], button[onclick*="removeTopic"] {
      display: none !important;
    }
    .case-ttl-input { pointer-events: none; border: none !important; }
    .pad-title { pointer-events: none; }
    .topic-text { pointer-events: none; }
    .task-title-input { pointer-events: none; display: block !important; }
    .topbar { justify-content: flex-start; gap: 12px; }
    .ro-badge {
      display: inline-flex !important;
      align-items: center;
      padding: 4px 12px;
      background: #fff8e6;
      border: 1px solid #f0d080;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      color: #b07d00;
      margin-left: auto;
    }
  </style>`;
  snapshot = snapshot.replace('</head>', roCSS + '</head>');

  // Add read-only badge in topbar
  snapshot = snapshot.replace(
    '<div id="modals"></div>',
    '<div id="modals"></div>'
  );
  snapshot = snapshot.replace(
    '</div>\n</div>\n<nav class="bottom-nav"',
    '<span class="ro-badge">👁 View Only</span>\n  </div>\n</div>\n<nav class="bottom-nav"'
  );

  const blob = new Blob([snapshot], {type: 'text/html'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'meeting-tracker-' + today() + '.html';
  a.click();
  toast('Share link ready!');
}

function importData(){
  const input=document.createElement('input');input.type='file';input.accept='.json';
  input.onchange=e=>{const file=e.target.files[0];if(!file)return;const reader=new FileReader();
    reader.onload=ev=>{try{const data=JSON.parse(ev.target.result);if(!data.meetings||!data.cases)throw new Error();S=data;activeMid=S.meetings[0]?.id||null;save();render();toast('Imported!');}catch{toast('Invalid file');}};
    reader.readAsText(file);};
  input.click();
}
